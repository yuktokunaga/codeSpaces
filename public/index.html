<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanet Tea</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,600;0,700;1,500&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="header-top">
            <a href="#" class="header-left">
                <img src="logo.png" alt="Japanet Tea" class="header-logo">
                <div class="brand-text">
                    <span class="brand-divider"></span>
                    <span class="header-tagline">The heart of Japan, in a cup of tea</span>
                </div>
            </a>
            <div class="header-actions">
                <div class="search-box">
                    <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" class="search-input" placeholder="Search our teas...">
                </div>
                <button class="cart-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                    <span id="cart-count">0</span>
                </button>
                <a href="#" class="login-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    Log in
                </a>
                <a href="#" class="register-btn">Register</a>
            </div>
        </div>
        <nav class="header-nav">
            <div class="nav-inner">
                <a href="#" class="nav-link active">Home</a>
                <a href="#" class="nav-link">Tea Collection</a>
                <a href="#" class="nav-link">Gifts</a>
                <a href="#" class="nav-link">About Us</a>
                <a href="#" class="nav-link">Contact</a>
            </div>
        </nav>
    </header>
<main class="infographic-container">
        <img src="images/Infographics1.png" alt="Tea Infographic 1" class="scrolling-img">
        <img src="images/Infographics2.png" alt="Tea Infographic 2" class="scrolling-img">
        <img src="images/Infographics3.png" alt="Tea Infographic 3" class="scrolling-img">
    </main>
</body>
</html>
